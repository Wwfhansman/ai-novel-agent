current_window: ch001-ch003
status: active
source_of_truth: "Near-future chapter synopsis authority only. Keep this file focused on upcoming planned chapters; move completed entries to planning/completed_plan_log.yml and distant ideas to planning/future_backlog.yml."
chapters:
  - chapter: ch001
    title: Old Wick
    status: planned
    macro_stage: part_001
    scale_level: district
    flow_id: arc_001_old_wick
    flow_position: opening
    synopsis: >
      Lin Qi is called to repair an old fog lamp in the outer corridor. While
      replacing the wick, she hears a memory echo that does not belong to the
      present scene. Patrol officers are already on their way to recover old
      wicks, so she hides one cracked fragment before they arrive. The chapter
      should open the memory-lamp premise through repair action, not through
      explanation.
    inbound_pressure: "Opening chapter. Old fog lamp failure and patrol recovery urgency."
    chapter_turn: "Lin Qi discovers that old wicks can preserve memory residue and hides a fragment."
    required_developments:
      - "Establish Lin Qi as a repair worker."
      - "Make old-wick memory residue canon."
      - "Bring patrol pressure to the door without explaining the full system."
    character_intents:
      - "Lin Qi wants to fix the lamp and understand the anomaly."
      - "Patrol wants all abnormal old wicks recovered."
    pressure_or_complication: "Patrol arrives before Lin Qi can openly inspect the fragment."
    payoff_or_reader_reward: "First supernatural signal and a concrete risky object."
    outbound_pressure: "Patrol reaches the lamp corridor while one wick fragment is missing."
    handoff_to_next_chapter: "Patrol opens the door and asks Lin Qi to hand over every removed old wick."
    external_state_at_end: "A public repair object becomes private evidence and patrol recovery reaches the scene."
    reader_motion: "Reader wants to know why patrol is urgent about old wicks."
    constraints:
      - "Do not reveal father_truth."
      - "Do not explain complete lamp rules."
    scale_pacing_constraints:
      - "Opening stage only: local memory-lamp anomaly, no citywide system reveal."
      - "Keep the old lamp district as an opening location, not the whole world."

  - chapter: ch002
    title: Recovery Order
    status: planned
    macro_stage: part_001
    scale_level: district
    flow_id: arc_001_old_wick
    flow_position: pressure_rising
    synopsis: >
      Patrol enters under the name of routine recovery and asks for all repair
      records. Lin Qi cooperates on the surface, but notices that several old
      ledger entries were altered before patrol arrived. She realizes the
      recovery is not routine; someone is cleaning traces from a specific time
      period. The pressure turns toward her father's old tool box.
    inbound_pressure: "Patrol demands the old wicks while Lin Qi still carries the hidden fragment."
    chapter_turn: "Lin Qi finds altered repair records and confirms the recovery is targeted."
    required_developments:
      - "Patrol agency intervenes."
      - "Altered records become evidence."
      - "The hidden fragment remains risky but safe for now."
    character_intents:
      - "Lin Qi wants to keep the clue."
      - "Patrol wants abnormal materials and records controlled."
    pressure_or_complication: "The repair log could expose Lin Qi's contact with the old wick."
    payoff_or_reader_reward: "Reader confirms a cover-up is underway."
    outbound_pressure: "Altered ledger traces point to the father's old tool box."
    handoff_to_next_chapter: "Lin Qi opens the old tool box and sees a nick in the repair knife."
    external_state_at_end: "Patrol pressure shifts from public recovery to private family risk."
    reader_motion: "Reader wants to know how the father's tool connects to the wick."
    constraints:
      - "Do not let patrol explain its full motive."
    scale_pacing_constraints:
      - "Keep pressure institutional but local; do not resolve Archive Bureau motive."
      - "Do not grant city-scale memory rewriting."

  - chapter: ch003
    title: Knife Mark
    status: planned
    macro_stage: part_001
    scale_level: district
    flow_id: arc_001_old_wick
    flow_position: turn
    synopsis: >
      Lin Qi finds that the nick in her father's repair knife matches a mark on
      the wick fragment. The father line moves from background grief into the
      current pressure. At the same time, patrol asks about the last tower her
      father repaired, making the question sound casual while tightening around
      the same object.
    inbound_pressure: "Lin Qi opens the father's old tool box while patrol investigates old repairs."
    chapter_turn: "The father's repair knife and the old wick fragment are visibly connected."
    required_developments:
      - "Father clue enters current plot."
      - "Repair knife connects to old wick marks."
      - "Patrol attention on Lin Qi escalates."
    character_intents:
      - "Lin Qi wants to confirm what her father touched."
      - "Patrol wants to test how much Lin Qi knows."
    pressure_or_complication: "Lin Qi cannot admit she noticed the knife-mark connection."
    payoff_or_reader_reward: "Mystery line and emotional line lock together for the first time."
    outbound_pressure: "Patrol begins using the father's old case to pressure Lin Qi."
    handoff_to_next_chapter: "Patrol asks about the last tower her father repaired and requests the old tool box registration."
    external_state_at_end: "The father's old file becomes an active handle for patrol pressure."
    reader_motion: "Reader wants to see how Lin Qi protects the clue without exposing herself."
    constraints:
      - "Do not confirm whether the father is alive."
    scale_pacing_constraints:
      - "Father line may become personal pressure, not a full reveal."
      - "Current scope remains old lamp district."
notes: "Example only. Completed chapter plans should be archived to planning/completed_plan_log.yml. Distant ideas belong in planning/future_backlog.yml."

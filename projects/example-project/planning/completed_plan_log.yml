  synopsis: '大雾夜，林栖被叫去外环灯廊修一盏反复熄灭的旧雾灯。拆开铜罩、抽出旧灯芯的瞬间，她听见灯芯灰里响了一句不属于今夜的话——"别把灯交出去"。声音极轻，像从潮湿金属深处擦出来。巡灯署的人已经到了廊外，催她换芯。林栖压下心跳，把一片裂开的灯芯碎片藏进袖口，重新扣上铜罩。门被推开，领头的伸出手：所有拆下来的旧灯芯，立刻回收。

'

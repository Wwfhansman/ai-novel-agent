schema: chapter_shape_history
purpose: >
  Tracks chapter shapes so adjacent chapters do not repeat the same opening,
  attention source, conflict mode, exposition mode, ending hook, or state delta.

fields:
  chapters:
    required: true
    type: list
    item_fields:
      chapter:
        required: true
        purpose: Chapter id.
        example: ch004
      opening_type:
        required: true
        purpose: How the chapter enters the scene.
        allowed_examples:
          - concrete_disturbance
          - dialogue_with_pressure
          - consequence_in_motion
          - character_already_acting
          - loaded_quiet_image
      attention_source:
        required: true
        purpose: What keeps the reader reading.
        allowed_examples:
          - unknown
          - danger
          - irony
          - relationship_shift
          - resource_pressure
          - rule_reversal
      main_conflict_mode:
        required: true
        purpose: Dominant conflict pattern.
        allowed_examples:
          - negotiation
          - pursuit
          - concealment
          - test
          - public_pressure
          - moral_choice
      exposition_mode:
        required: true
        purpose: How information entered the chapter.
        allowed_examples:
          - revealed_through_argument
          - discovered_object
          - failed_action
          - rumor
          - cost_of_choice
      ending_hook_type:
        required: true
        purpose: How the ending pushes outward.
        allowed_examples:
          - action_begins
          - new_arrival
          - fact_exposed
          - cost_lands
          - rule_changes
          - promise_made
      primary_state_delta:
        required: true
        purpose: Main external state changed by the chapter.
        allowed_examples:
          - relationship_changed
          - resource_changed
          - knowledge_visibility_changed
          - debt_changed
          - danger_level_changed
          - reputation_changed

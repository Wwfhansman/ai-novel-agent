schema: canon_delta
purpose: 记录单章造成的变化。它是变更日志，不是当前状态总表；当前状态必须合并到 entities、ledgers、planning 或 volumes。
fields:
  chapter:
    required: true
    description: 章节 ID。
    example: ch001
  new_facts:
    required: true
    type: list
    description: 本章新进入正史的事实。
  character_changes:
    required: true
    type: list
    description: 人物状态变化；写完后必须同步到 entities/characters.yml。
    item_fields: [character, change]
    note: "条目必须包含 character/name/id 之一，便于 validator 对照 entities/characters.yml 的 last_updated/change_history。"
  relationship_changes:
    required: true
    type: list
    description: 人物关系变化。
    item_fields: [pair, change]
  world_state_changes:
    required: true
    type: list
    description: 外部世界、资源、危机或势力变化；写完后必须同步到 ledgers/world_state.yml。
  knowledge_changes:
    required: true
    type: list
    description: 信息可见性变化；写完后必须同步到 ledgers/knowledge_state.yml。
  foreshadowing_added:
    required: true
    type: list
    description: 本章新增伏笔。
  foreshadowing_advanced:
    required: true
    type: list
    description: 本章推进但未回收的伏笔。
  foreshadowing_paid:
    required: true
    type: list
    description: 本章回收的伏笔。
  narrative_debts_added:
    required: true
    type: list
    description: 本章新增叙事债。
  narrative_debts_advanced:
    required: true
    type: list
    description: 本章推进的叙事债。
  narrative_debts_paid:
    required: true
    type: list
    description: 本章偿还的叙事债。
  ideas_added:
    required: true
    type: list
    description: 本章产生但未进入正史的灵感。
  actual_handoff:
    required: true
    type: list
    description: 本章最终实际留下的外部压力、未完成动作、关系变化、物件、信息差或可见后果；下一章必须承接，不能只是“主角决定下一步”。
  state_sync:
    required: true
    type: list
    description: 本章 canon_delta 已合入哪些当前状态文件。validator 会用它防止只写变化日志、不更新 entities/ledgers/planning。
    item_fields: [target, status, evidence]
    allowed_status: [merged, updated, synced, n/a, needs_director_review]
    note: "当对应变化字段非空时，状态必须是 merged / updated / synced；n/a 只允许用于本章无该类变化的目标。"
    example:
      - target: entities/characters.yml
        status: merged
        evidence: "顾长宁 current_status / change_history 已同步到 ch012。"
      - target: ledgers/world_state.yml
        status: n/a
        evidence: "本章无外部世界状态变化。"
  handoff_to_next_chapter:
    required: false
    deprecated: true
    type: list
    description: 旧字段。新文件应使用 actual_handoff。
  next_chapter_handoff:
    required: false
    deprecated: true
    type: list
    description: 旧字段。新文件应使用 actual_handoff。

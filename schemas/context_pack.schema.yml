schema: context_pack
purpose: >
  Records the reproducible context compilation result before writing.
  It is the visible input contract for a round or chapter, not prose and not
  the current-state source of truth.

fields:
  metadata:
    required: true
    fields:
      project:
        required: true
        purpose: Project name or id.
        example: example-project
      scope:
        required: true
        allowed: [round, chapter]
        purpose: Whether this pack supports a round or a single chapter.
        example: chapter
      round:
        required: true
        purpose: Round id.
        example: round_001
      chapter:
        required: false
        purpose: Chapter id when scope is chapter.
        example: ch001
      generated_at:
        required: true
        purpose: Generation timestamp.
        example: "2026-05-19T14:00:00+08:00"
      agent:
        required: true
        purpose: Agent or model identifier.
        example: codex

  purpose:
    required: true
    purpose: What writing task this pack supports.
    example: Prepare ch004 by carrying forward the prior chapter's public pressure and resource shortage.

  context_budget:
    required: true
    fields:
      target_size:
        required: true
        purpose: Intended pack size.
        example: "chapter 1000-2500 Chinese characters"
      actual_approx_size:
        required: false
        purpose: Rough size note if useful.
        example: "about 1800 Chinese characters"
      budget_notes:
        required: false
        purpose: What was intentionally omitted to keep the pack lean.

  model_routing:
    required: false
    fields:
      premium_model:
        required: false
        purpose: High-quality model or agent responsible for creative and canon decisions.
        example: premium_model
      fast_model:
        required: false
        purpose: Cheap or fast model used for mechanical tasks, if any.
        example: fast_model
      premium_tasks:
        required: false
        type: list
        example: [draft_final_prose, active_flow_confirmation, canon_merge]
      fast_tasks:
        required: false
        type: list
        example: [txt_spacing_fix, validator_error_summary]
      final_quality_gate_by:
        required: false
        allowed: [premium_model, human]
        purpose: Who confirms outputs before final prose or canon updates.
        example: premium_model

  read_files:
    required: true
    type: list
    purpose: Files read while compiling context.
    item_fields:
      file:
        required: true
        example: chapters/ch003/final.txt
      read_mode:
        required: true
        allowed: [full, summary, excerpt, targeted, not_read]
        example: full
      reason:
        required: true
        example: Immediate continuity from previous chapter.
      key_takeaway:
        required: true
        example: The chapter ended with public trust damaged, not restored.

  global_understanding:
    required: false
    purpose: Current whole-book understanding.

  completed_volumes:
    required: false
    purpose: Completed volume effects on current writing.

  current_volume_state:
    required: false
    purpose: Current volume goal, phase, contradictions, and remaining tasks.

  current_arc_state:
    required: false
    purpose: Current 3-10 chapter event chain and phase.

  active_narrative_flow:
    required: true
    purpose: Current cross-round pressure/event chain from planning/active_flow.yml.

  recent_chapter_understanding:
    required: true
    purpose: Understanding from recent chapter summaries.

  recent_full_text_continuity:
    required: true
    purpose: Tone, rhythm, emotional carryover, and scene handoff from recent full chapters.

  detailed_rolling_synopsis:
    required: true
    purpose: >
      Relevant chapter entries and later constraints from planning/rolling_plan.yml.
      The full rolling plan should be read before a round, but not copied in full.

  current_round_extract:
    required: true
    purpose: Production-batch extract from the rolling synopsis, not a story container.

  previous_chapter_handoff:
    required: false
    purpose: Exact pressure, action, image, unresolved problem, or emotional state carried from the prior chapter.

  cut_continuity:
    required: true
    fields:
      previous_cut_pickup:
        required: false
        purpose: For non-opening chapters, the exact prior cut picked up in this task.
      inbound_pressure:
        required: true
      chapter_turn:
        required: true
      outbound_pressure:
        required: true
      handoff_to_next_chapter:
        required: true
        purpose: Concrete first moment or pressure the next chapter must inherit.
      transition_justification:
        required: false
        purpose: Required if the chapter does not open from the prior handoff.

  key_old_chapter_lookbacks:
    required: true
    type: list
    purpose: Old full-text chapters reread for foreshadowing, debts, objects, relationships, rules, or lines.

  active_narrative_debts:
    required: true
    purpose: Debts to add, advance, pay, or intentionally delay.

  active_foreshadowing:
    required: true
    purpose: Relevant foreshadowing and leak limits.

  knowledge_state:
    required: true
    purpose: Who knows what, who misunderstands what, and what the reader knows.

  character_intent:
    required: true
    purpose: Current goals, bottom lines, misunderstandings, and likely moves.

  world_pressure:
    required: true
    purpose: World state, faction moves, resources, crisis, and external pressure.

  style_and_format_constraints:
    required: true
    purpose: Style rules, banned tendencies, prose risks, and TXT formatting constraints.

  prose_freedom_notes:
    required: false
    purpose: Optional sparks for scene entry, images, dialogue, local details, or small inventions. These are not a template.

  forbidden_moves:
    required: true
    purpose: Moves forbidden by canon, visibility, user intent, or protected files.

  unknowns_and_risks:
    required: true
    purpose: Uncertain information and likely drift/flattening risks.

  required_updates_after_writing:
    required: true
    purpose: Files that must be updated after writing.

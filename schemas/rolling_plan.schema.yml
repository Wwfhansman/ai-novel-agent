schema: rolling_plan
purpose: >
  Authoritative detailed synopsis for the next 6-15 chapters. It drives prose
  writing at the story-content level and must not be treated as a fixed
  intra-chapter structure.

fields:
  current_window:
    required: true
    purpose: Chapter range covered by this rolling plan.
    example: ch008-ch015

  status:
    required: true
    allowed: [draft, active, needs_refresh]
    purpose: Whether the plan is ready to drive writing.
    example: active

  source_of_truth:
    required: true
    purpose: Human-readable reminder that this file is the authority for near-future chapter synopsis.
    example: "Near-future chapter synopsis authority; current_round.yml is only a production extract."

  chapters:
    required: true
    type: list
    item_fields:
      chapter:
        required: true
        example: ch008
      title:
        required: false
        example: 余粮
      status:
        required: true
        allowed: [planned, drafting, completed, revised, skipped]
        example: planned
      flow_id:
        required: true
        purpose: Continuous narrative flow this chapter belongs to.
        example: arc_001_old_wick
      flow_position:
        required: true
        allowed: [opening, pressure_rising, turn, fallout, payoff, transition]
        purpose: Position inside the flow, not inside the three-chapter round.
        example: pressure_rising
      synopsis:
        required: true
        purpose: 300-800 Chinese characters of story content, not scene beats.
        example: "上一章的监视压力没有消失，主角退到幕后后..."
      inbound_pressure:
        required: true
        purpose: What pressure, action, or unresolved problem carries in.
      chapter_turn:
        required: true
        purpose: Irreversible external change caused by this chapter.
      required_developments:
        required: true
        type: list
        purpose: Plot developments that must happen.
      character_intents:
        required: true
        type: list
        purpose: Important characters and what they want in this chapter.
      pressure_or_complication:
        required: true
        purpose: What makes the chapter non-smooth.
      payoff_or_reader_reward:
        required: true
        purpose: What reader reward, reveal, or progress this chapter gives.
      outbound_pressure:
        required: true
        purpose: External pressure or unfinished motion that survives into the next chapter.
      handoff_to_next_chapter:
        required: true
        purpose: The exact visible first moment or concrete pressure the next chapter should pick up.
      external_state_at_end:
        required: true
        purpose: What changed in the world, relationship, resource, danger, leverage, or information visibility.
      reader_motion:
        required: false
        purpose: What the reader should want to know or see next.
      constraints:
        required: false
        type: list
        purpose: Canon, visibility, or protected-file restrictions.

  notes:
    required: false
    purpose: General planning notes.

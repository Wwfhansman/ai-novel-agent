schema: rolling_plan
purpose: >
  Authoritative detailed synopsis for the next 6-15 upcoming chapters. It drives
  prose writing at the story-content level and must not be treated as a fixed
  intra-chapter structure. Completed chapter plans should be archived to
  planning/completed_plan_log.yml; distant ideas belong in planning/future_backlog.yml.

fields:
  current_window:
    required: true
    purpose: Chapter range covered by this rolling plan.
    example: ch008-ch015

  status:
    required: true
    allowed: [draft, active, needs_refresh]
    purpose: Whether the plan is ready to drive writing.
    example: active

  source_of_truth:
    required: true
    purpose: Human-readable reminder that this file is the authority for near-future chapter synopsis.
    example: "Near-future chapter synopsis authority; current_round.yml is only a production-batch tracker."

  chapters:
    required: true
    type: list
    item_fields:
      chapter:
        required: true
        example: ch008
      title:
        required: false
      status:
        required: true
        allowed: [planned, drafting, revised, skipped]
      macro_stage:
        required: true
        purpose: Part/stage id from book/longform_blueprint.yml.
      scale_level:
        required: true
        purpose: Intended story scale for this chapter.
      flow_id:
        required: true
        purpose: Continuous narrative flow this chapter belongs to.
      flow_position:
        required: true
        allowed: [opening, pressure_rising, turn, fallout, payoff, transition]
        purpose: Position inside the flow, not inside the three-chapter round.
      cross_chapter_event:
        required: true
        purpose: Event that spans chapter boundaries; use N/A only when this chapter is deliberately standalone.
      starts_mid_action:
        required: true
        purpose: Whether the chapter opens inside an already-moving action/pressure rather than resetting to a new day/task.
      ends_mid_action:
        required: true
        purpose: Whether the chapter cuts while the event remains in motion rather than closing with a next-step decision.
      chapter_function:
        required: true
        purpose: Web-novel chapter function, such as crisis, face_slap, investigation, building, relationship, aftermath, transition, or project-specific equivalent.
      synopsis:
        required: true
        purpose: 300-800 Chinese characters of story content, not scene beats.
      pressure_curve:
        required: true
        fields:
          position_in_flow:
            required: true
            allowed: [opening, rising_early, rising_middle, peak, aftermath_trough]
            purpose: Where this chapter sits in the larger active flow.
          chapter_internal_motion:
            required: true
            purpose: The chapter's local motion inside the larger flow; it does not need to close the whole event.
      reader_question_flow:
        required: true
        fields:
          enters_with:
            required: true
            purpose: Visible reader expectation entering this chapter.
          leaves_with:
            required: true
            purpose: Visible reader expectation leaving this chapter.
      core_advance:
        required: true
        fields:
          one_sentence:
            required: true
            purpose: The one primary external advancement.
          must_happen:
            required: false
            type: list
          must_not_complete:
            required: true
            type: list
            purpose: What this chapter deliberately leaves unfinished.
      information_release:
        required: true
        fields:
          new_core_variables:
            required: true
            type: list
            purpose: 1-2 new variables readers must remember.
          deferred:
            required: true
            type: list
            purpose: Information, rules, identities, resources, or relationship changes delayed to later chapters.
      chapter_turn:
        required: true
        purpose: Irreversible external change caused by this chapter, including world/relationship/resource state.
      side_yield:
        required: true
        type: list
        purpose: World/system texture, relationship shifts, resource changes, or reusable foreshadowing beyond the core advance.
      叙事织入:
        required: true
        purpose: Branch-and-leaf material that gives characters, places, systems, and relationships lived-in texture.
        suggested_fields:
          人物日常反应: []
          场景即时质感: []
          关系温度波动: []
      density_control:
        required: true
        fields:
          required_weave_beats:
            required: true
            type: integer
          allow_idle:
            required: true
            type: boolean
      planned_handoff:
        required: true
        purpose: Concrete visible pressure, action, consequence, object, or relationship change the next chapter must pick up.
      constraints:
        required: false
        type: list
      scale_pacing_constraints:
        required: false
        type: list
        purpose: Limits from book/longform_blueprint.yml that prevent scale collapse, premature reveals, or over-fast progression.

  chapter_shape_template:
    required: false
    purpose: Empty helper shape used by templates only; real project entries live under chapters.

  notes:
    required: false
    purpose: General planning notes.

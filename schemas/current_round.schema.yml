schema: current_round
purpose: >
  Lightweight production-batch tracker. It records which chapters are being
  written together and where the batch starts/ends inside active flow. It is not
  a story unit and not an independent planning authority.

fields:
  round:
    required: true
    example: round_003
  chapters:
    required: true
    type: list
    purpose: Chapter ids in this production batch, usually three.
  source:
    required: true
    purpose: Must point to planning/rolling_plan.yml.
    example: planning/rolling_plan.yml
  status:
    required: true
    allowed: [planned, in_progress, completed, needs_refresh]
  batch_edges:
    required: true
    fields:
      starts_inside_flow:
        required: true
        purpose: How this batch starts inside the active narrative flow.
      ends_inside_flow:
        required: true
        purpose: How this batch ends inside the active narrative flow.
  completed_chapters:
    required: false
    type: list
    purpose: Optional short completion notes after a batch is done.
  post_round_state:
    required: false
    purpose: Optional checklist of memory/planning files updated after completion.
  notes:
    required: false
    purpose: Operational note; must not add plot goals absent from rolling_plan.yml.

deprecated_fields:
  source_plan:
    replacement: source
  source_flow:
    replacement: planning/active_flow.yml referenced from writing_packet or notes
  production_batch:
    replacement: chapters
  goals:
    replacement: batch_edges or notes
  chapter_entries:
    replacement: planning/rolling_plan.yml

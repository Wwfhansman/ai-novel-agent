schema: active_flow
purpose: >
  Current cross-round narrative flow authority. A flow is the continuous
  pressure/event chain that chapters cut from; it may span across multiple
  three-chapter production rounds. Per-chapter planning belongs in rolling_plan.yml.

fields:
  current_flow:
    required: true
    fields:
      id:
        required: true
        example: flow_v1_survival
      status:
        required: true
        allowed: [active, turning, ending, paused]
      linked_arc:
        required: false
      span:
        required: true
        fields:
          started_at:
            required: true
          expected_range:
            required: true
            purpose: Flexible planned range, not a hard promise.
      central_motion:
        required: true
        purpose: The pressure or event chain that keeps moving from chapter to chapter.
      current_pressure:
        required: true
        purpose: External pressure currently in motion.
      active_questions:
        required: true
        type: list
        purpose: Reader-facing practical or dramatic questions still open.
      last_cut:
        required: true
        fields:
          chapter:
            required: false
          last_visible_moment:
            required: false
          current_handoff:
            required: false
            purpose: Latest actual handoff that the next chapter should treat as primary input.
      end_conditions:
        required: true
        type: list
        purpose: Conditions that justify ending this flow.
      round_boundary_rule:
        required: true
        purpose: Reminder that round boundaries do not close this flow.
      parallel_flows:
        required: false
        type: list
        purpose: Secondary active flows such as relationship, illness, faction, or mystery lines.

  completed_flows:
    required: true
    type: list
    purpose: Closed flow ids and payoff notes.

  notes:
    required: false
    purpose: Operational notes for maintaining continuity.
